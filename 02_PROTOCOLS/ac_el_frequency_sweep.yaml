protocol_id: "ac_el_frequency_sweep"
version: "1.0"
scope: "AC-driven PeLED 的 frequency-dependent electroluminescence 测试"
goal: "测量 AC-driven PeLED 的 frequency-dependent EL，并区分器件响应、仪器带宽和极化/离子过程的可能贡献。"
replicates:
  independent_devices_per_condition: "Not explicitly specified in text"
  waveform_repeats_per_device: "Not explicitly specified in text"
  report_planned_completed_failed_counts: true
statistics:
  primary_summary: "按 frequency 报告 median、IQR、individual devices 和有效样本数"
  comparison_method: "Not explicitly specified in text"
  uncertainty: "同时报告 device-to-device variation 与 repeated-waveform variation"
failed_device_policy:
  - "所有通电后 open/short/no-EL devices 均计入 planned 与 failed counts"
  - "failed device 不从 denominator 静默删除；保留 failure stage 与可能原因"
exclusion_criteria:
  - "仅使用实验前定义的仪器饱和、触发失败、文件损坏或确认接触失效标准"
  - "不得因结果偏离趋势或降低平均值而排除"
required_inputs:
  sample_ids: ["Not explicitly specified in text"]
  device_stack: "Not explicitly specified in text"
  device_area: "Not explicitly specified in text"
  waveform_generator: "Not explicitly specified in text"
  voltage_monitor: "Not explicitly specified in text"
  current_monitor: "Not explicitly specified in text"
  optical_detector: "Not explicitly specified in text"
  detector_bandwidth: "Not explicitly specified in text"
controlled_variables:
  - "同批器件或明确记录 batch"
  - "waveform shape"
  - "voltage definition: peak / peak-to-peak / RMS"
  - "duty cycle"
  - "temperature, atmosphere, encapsulation"
frequency_range:
  start: "Not explicitly specified in text"
  stop: "Not explicitly specified in text"
  unit: "Hz"
  points: "Not explicitly specified in text"
  spacing: "linear / logarithmic / custom"
  sweep_order: "low-to-high / high-to-low / randomized"
fixed_parameters:
  waveform: "Not explicitly specified in text"
  voltage_amplitude: "Not explicitly specified in text"
  duty_cycle: "Not explicitly specified in text"
  cycles_before_recording: "Not explicitly specified in text"
  integration_window: "Not explicitly specified in text"
measurements:
  - "time_s, voltage_V, current_mA, EL_intensity_a.u."
  - "EL spectrum at selected frequencies"
  - "device temperature when available"
  - "before/after reference measurement"
calculated_metrics:
  - "positive and negative half-cycle integrated EL"
  - "R_PN = I_positive / I_negative"
  - "phase lag between voltage reference and EL response"
  - "EL intensity normalized to selected reference"
expected_outputs:
  - "frequency-response table with raw and normalized metrics"
  - "voltage/current/EL waveform plots"
  - "hysteresis check from reverse or repeated sweep"
critical_checks:
  - "sampling rate and detector bandwidth exceed the frequency content being interpreted"
  - "actual voltage across device is monitored, not only generator setting"
  - "current and optical channels share a verified trigger/time base"
  - "device degradation is separated from frequency dependence"
possible_failure_modes:
  - "detector roll-off mimics EL decrease at high frequency"
  - "cable/probe impedance changes device voltage"
  - "self-heating or degradation during sweep"
  - "insufficient cycles for steady response"
  - "EL below detector noise floor"
