protocol_id: "transport_layer_screening"
version: "1.0"
scope: "AC-driven PeLED 中 HTL、ETL、blocking layer 与 injection layer 筛选"
goal: "筛选 HTL、ETL、blocking layer 或 injection layer 对 AC EL 注入对称性、界面极化和稳定性的影响。"
replicates:
  independent_devices_per_candidate: "Not explicitly specified in text"
  fabrication_batches: "Not explicitly specified in text"
  repeated_measurements_per_device: "Not explicitly specified in text"
  report_planned_completed_failed_counts: true
statistics:
  primary_summary: "按 candidate 报告 individual devices、median、IQR、yield 与 batch"
  comparison_method: "Not explicitly specified in text"
  multiple_comparison_policy: "若同时比较多个 layers，预先定义 correction 或 exploratory status"
failed_device_policy:
  - "short/open/no-EL devices 保留在 yield 与 failure analysis"
  - "记录 failure 与 layer deposition、contact、EML batch 的时间关系"
exclusion_criteria:
  - "仅排除预先定义的 fabrication handling damage、confirmed contact failure 或 corrupted acquisition"
  - "不得按 PN ratio、luminance 或 EQE 结果事后排除"
research_question: "Not explicitly specified in text"
baseline_device:
  stack: "Not explicitly specified in text"
  batch: "Not explicitly specified in text"
screened_layer:
  role: "HTL / ETL / blocking layer / injection layer"
  candidates: ["Not explicitly specified in text"]
  thicknesses: ["Not explicitly specified in text"]
controlled_variables:
  - "EML batch and thickness"
  - "electrode and device area"
  - "fabrication atmosphere and annealing history"
  - "AC waveform, frequency, voltage and duty cycle"
controls:
  reference_device: "Not explicitly specified in text"
  single_carrier_devices: "Not explicitly specified in text or mark unavailable"
  replicate_count: "Not explicitly specified in text"
measurements:
  - "energy level or injection-barrier evidence available to the project"
  - "positive/negative half-cycle current and EL"
  - "R_PN and phase lag"
  - "EL spectrum, luminance and stability"
mandatory_checks:
  blocks_one_carrier: "Does the layer preferentially block electrons or holes? Evidence: Not explicitly specified in text"
  causes_unidirectional_injection: "Check whether EL appears mainly in one polarity."
  changes_EL_symmetry: "Compare I_positive, I_negative and R_PN."
  changes_ion_accumulation_or_interfacial_polarization: "Use frequency/time dependence and controls; do not infer from one waveform."
  introduces_injection_barrier: "Check turn-on/current response and independent energy-level evidence."
expected_outputs:
  - "candidate-by-metric comparison table"
  - "mechanism hypotheses separated by evidence level"
  - "recommended follow-up control"
failure_modes:
  - "thickness or morphology changes confound material identity"
  - "different batches dominate apparent layer effect"
  - "series resistance and heating mimic injection barrier"
  - "single champion device hides poor reproducibility"
