protocol_id: "ac_stability_test"
version: "1.0"
scope: "AC-driven PeLED 在受控 waveform 与环境条件下的 operating stability 测试"
goal: "在明确 AC bias 与环境条件下测量器件亮度、光谱和 waveform 稳定性。"
replicates:
  independent_devices_per_condition: "Not explicitly specified in text"
  repeated_runs_per_device: "Not explicitly specified in text"
  report_planned_completed_failed_censored_counts: true
statistics:
  primary_summary: "报告 individual retention curves、median lifetime、IQR 与 censored devices"
  lifetime_comparison_method: "Not explicitly specified in text"
  uncertainty: "区分 measurement drift、device variation 与 threshold interpolation uncertainty"
failed_device_policy:
  - "early failure、open circuit、short circuit 与未达到 threshold 的 device 分别记录"
  - "未达到 T50/T80 的测试按 censored data 报告，不写成精确 lifetime"
exclusion_criteria:
  - "仅排除预先定义的仪器中断、数据文件损坏或测试前确认的接触失效"
  - "退化过快或表现较差不是排除理由"
sample_ids: ["Not explicitly specified in text"]
device_area: "Not explicitly specified in text"
preconditioning:
  method: "Not explicitly specified in text"
  duration: "Not explicitly specified in text"
  acceptance_check: "记录测试前 luminance、spectrum、voltage 与 current 是否稳定"
brightness_condition:
  control_mode: "constant voltage / constant current / constant initial luminance / other"
  initial_luminance: "Not explicitly specified in text"
  stabilization_time: "Not explicitly specified in text"
driving_condition:
  voltage: "Not explicitly specified in text; specify peak / peak-to-peak / RMS"
  frequency: "Not explicitly specified in text"
  waveform: "Not explicitly specified in text"
  duty_cycle: "Not explicitly specified in text"
ac_dc_matching_criteria:
  primary_basis: "initial luminance / current density / RMS power / accumulated charge / peak field / other"
  value_and_tolerance: "Not explicitly specified in text"
  unmatched_factors: ["Not explicitly specified in text"]
atmosphere:
  type: "air / N2 / vacuum / controlled humidity"
  temperature: "Not explicitly specified in text"
  relative_humidity: "Not explicitly specified in text"
encapsulation:
  method: "Not explicitly specified in text"
  cure_condition: "Not explicitly specified in text"
lifetime_metric:
  primary: "T50 / T80 / retention"
  definition: "time when measured signal first reaches the selected fraction of I0"
  censoring_rule: "If threshold is not reached, report test duration and not reached."
measurements:
  luminance_interval: "Not explicitly specified in text"
  spectrum_interval: "Not explicitly specified in text"
  waveform_interval: "Not explicitly specified in text"
  temperature_interval: "Not explicitly specified in text"
temperature_monitoring:
  sensor_and_location: "Not explicitly specified in text"
  baseline_temperature: "Not explicitly specified in text"
  maximum_allowed_change: "Not explicitly specified in text"
rest_recovery_testing:
  enabled: "Not explicitly specified in text"
  rest_duration: "Not explicitly specified in text"
  measurements_before_and_after_rest: ["luminance", "spectrum", "voltage", "current", "R_PN"]
spectral_stability:
  metrics: ["EL_peak_nm", "FWHM_nm", "integrated_spectrum", "new spectral features"]
spectral_recovery_check:
  compare_points: ["before stress", "end of stress", "after rest"]
  recovery_definition: "Not explicitly specified in text"
waveform_stability:
  metrics: ["I_positive", "I_negative", "R_PN", "phase lag", "current waveform"]
interpretation_boundary:
  lifetime_observation: "报告 retention curve、T50/T80、failed/censored devices 与 measurement conditions。"
  causal_interpretation: "AC stabilization 是否来自 suppressed ion migration 必须由 matched controls、recovery 或独立 ion-sensitive evidence 支持。"
  unsupported_causal_claim: "UNVERIFIED"
possible_degradation_mechanisms:
  - "Joule heating"
  - "ion migration and interfacial accumulation"
  - "electrode or transport-layer reaction"
  - "phase segregation or composition change"
  - "encapsulation failure or atmosphere exposure"
critical_checks:
  - "记录实际器件电压与电流，而不仅是电源设定"
  - "确认 detector drift 与光路稳定性"
  - "保留失效器件和异常器件，不只报告 champion"
  - "退化机制必须由额外证据支持"
  - "AC/DC comparison 必须报告 matching basis；未匹配的 power、charge、temperature 或 peak field 是替代解释"
