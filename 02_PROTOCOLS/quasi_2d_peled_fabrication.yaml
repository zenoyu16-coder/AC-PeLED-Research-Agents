protocol_id: "quasi_2d_peled_fabrication"
version: "1.0"
scope: "quasi-2D PeLED precursor、film formation、device fabrication 与 characterization"
goal: "记录并复现 quasi-2D PeLED 制备；本模板不提供未经验证的配方参数。"
replicates:
  independent_solution_batches: "Not explicitly specified in text"
  substrates_per_condition: "Not explicitly specified in text"
  devices_per_substrate: "Not explicitly specified in text"
  report_planned_fabricated_measured_failed_counts: true
statistics:
  primary_summary: "报告 device-level distribution、median、IQR、yield 与 batch effect"
  comparison_method: "Not explicitly specified in text"
  uncertainty: "区分 solution batch、substrate、pixel/device 与 measurement variation"
failed_device_policy:
  - "fabrication failure、short/open、non-emissive pixel 与 unstable contact 分别记录"
  - "所有 fabricated devices 进入 yield denominator，除非满足预先定义 exclusion"
exclusion_criteria:
  - "仅排除预先定义的 substrate breakage、masking error、instrument file corruption"
  - "不得只保留 champion pixels 或按 EQE/luminance 事后筛选"
precursor_composition:
  perovskite_formula: "Not explicitly specified in text"
  precursor_salts: ["Not explicitly specified in text"]
  molar_ratios: "Not explicitly specified in text"
  concentration: "Not explicitly specified in text"
spacer_cation:
  identity: "Not explicitly specified in text"
  ratio: "Not explicitly specified in text"
  purity: "Not explicitly specified in text"
solvent:
  components: ["Not explicitly specified in text"]
  volume_ratio: "Not explicitly specified in text"
  additives: ["Not explicitly specified in text"]
  filtration: "Not explicitly specified in text"
substrate_preparation:
  substrate: "Not explicitly specified in text"
  cleaning: "Not explicitly specified in text"
  surface_treatment: "Not explicitly specified in text"
spin_coating:
  atmosphere: "Not explicitly specified in text"
  steps:
    - speed: "Not explicitly specified in text"
      acceleration: "Not explicitly specified in text"
      duration: "Not explicitly specified in text"
antisolvent:
  identity: "Not explicitly specified in text"
  volume: "Not explicitly specified in text"
  timing: "Not explicitly specified in text"
  delivery_method: "Not explicitly specified in text"
annealing:
  temperature: "Not explicitly specified in text"
  duration: "Not explicitly specified in text"
  atmosphere: "Not explicitly specified in text"
device_stack:
  full_stack: "Not explicitly specified in text"
  layer_thicknesses: "Not explicitly specified in text"
  electrode_deposition: "Not explicitly specified in text"
  device_area: "Not explicitly specified in text"
  encapsulation: "Not explicitly specified in text"
characterization:
  film: ["absorption", "PL", "PLQY", "TRPL", "morphology", "phase/structure"]
  device: ["J-V-L", "EL spectrum", "EQE", "time-resolved EL", "stability"]
missing_parameter_checklist:
  - "precursor concentration and molar ratio"
  - "spacer identity, ratio and purity"
  - "solvent/additive identity and aging time"
  - "spin speed, acceleration and duration"
  - "antisolvent timing and volume"
  - "annealing temperature, duration and atmosphere"
  - "all layer thicknesses and deposition conditions"
  - "device area, encapsulation and measurement environment"
quality_controls:
  - "记录 batch、solution age 与 substrate lot"
  - "至少设置 reference formulation"
  - "PLQY/TRPL 结果不得直接替代 device EL/EQE 测量"
