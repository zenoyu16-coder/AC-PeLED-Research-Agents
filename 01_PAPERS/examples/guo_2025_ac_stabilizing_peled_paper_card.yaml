mechanism:
  main_claim: "Alternating voltage suppresses ion migration and improves PeLED operational and spectral stability."
  material_structure_link: "TOF-SIMS and reconstructed iodine distributions show less iodine accumulation after AC aging than after DC aging; Figure 4a-d."
  carrier_transport_link: "The authors attribute lower EQE roll-off to periodic charge injection reducing charge-carrier accumulation; this is an author interpretation supported by the J90 comparison."
  ion_migration_or_polarization: "TOF-SIMS and lateral-field microscopy provide direct evidence for different iodine redistribution/damage patterns under AC and DC treatment; assigning this entirely to suppressed ion migration requires support from hysteresis, tDOS, and the authors' field-reversal interpretation."
  recombination_mechanism: "The authors attribute reduced high-current roll-off to mitigation of Auger-related exciton-charge annihilation under periodic injection."
  degradation_mechanism: "Under DC, iodine species migrate toward the anode-side interface and are associated with hysteresis, trap-state formation, spectral drift, and rapid operational decay."

evidence:
  direct_evidence:
    - "Figure 3a: measured FAPbI3 T50 was 424 min under AC and 10.3 min under DC under the same stated conditions."
    - "Figure 3b,c,e,f: time-dependent spectra show improved spectral stability under AC operation."
    - "Figure 1f: AC and DC EQE-current behavior directly shows a reduced roll-off trend under AC; J90 is 330 mA cm^-2 under DC, while AC J90 exceeding 500 mA cm^-2 is inferred/estimated because the crossing point was not directly measured."
    - "Figure 4a-d: TOF-SIMS directly supports reduced iodine accumulation/redistribution after AC aging relative to DC aging; TOF-SIMS alone does not completely prove the full suppressed-ion-migration mechanism."
    - "Figure 4h,i: lateral-field microscopy shows visible damage under DC and no obvious damage after longer AC exposure."
  indirect_evidence:
    - "Figure 4e,f: stronger and cycle-dependent J-V hysteresis under DC than AC is consistent with greater mobile-ion redistribution."
    - "Figure 4g: lower tDOS after AC aging is consistent with reduced ion-migration-associated defect formation but does not alone prove ion migration."
    - "Operational and spectral stability improvements are consistent with suppressed ion migration but do not alone establish the mechanism."
  author_hypothesis:
    - "Periodic reversal of the electric-field force impedes net iodine migration, and the negative voltage counteracts migration induced by the positive pulse."
    - "Periodic charge injection mitigates charge accumulation and thereby reduces Auger-related EQE roll-off."
    - "Reduced interfacial charge accumulation and heat generation contribute to AC efficiency and stability; direct thermal mapping is not reported."
  background_context:
    - "The Introduction describes ion migration under prolonged unidirectional DC fields as a major obstacle to PeLED stability."
    - "The paper cites prior work linking high-current EQE roll-off to Auger recombination."
