claim_evidence_records:
  - claim_id: "claim-001"
    claim: "AC-driven MAPbBrxI3-x PeLEDs can produce phase-resolved EL in both positive- and negative-voltage half-cycles of a sinusoidal waveform."
    evidence_locator: "Figures 3a,b at 75 Hz and Figures 5a,b at 5.6 kHz show synchronized applied-voltage and EL traces with emission in both half-cycles."
    support_class: "direct evidence"
    verification_status: "VERIFIED"
  - claim_id: "claim-002"
    claim: "Positive- and negative-half-cycle peak EL intensities can differ and depend on the perovskite composition."
    evidence_locator: "Figure 3c reports EL(-):EL(+) peak-intensity ratios across MAPbBrxI3-x compositions; the ratio is as high as 0.8 for MAPbI3 and decreases with bromine incorporation."
    support_class: "direct evidence for measured peak-intensity asymmetry and composition dependence; the ambipolarity explanation is not direct evidence"
    verification_status: "VERIFIED"
  - claim_id: "claim-003"
    claim: "The EL response depends on AC frequency and develops a voltage-EL phase lag at higher frequency."
    evidence_locator: "Figure 5c directly measures frequency-dependent phase lag, Figures 6a,b directly measure half-cycle EL intensity versus frequency, and Table I reports -3-dB frequencies of 5.8-22.7 kHz."
    support_class: "direct evidence for frequency dependence and phase lag; carrier-transit and effective-mobility interpretation is indirect support plus author interpretation"
    verification_status: "VERIFIED"
  - claim_id: "claim-004"
    claim: "Negative-half-cycle EL is attributed to residual carriers from the preceding positive half-cycle, while material-dependent PN behavior is attributed to ambipolar carrier transport."
    evidence_locator: "Section III.E and the Conclusion state the residual-carrier model; Figure 3c, Figure 4, and Figure 5 provide trends consistent with the model but do not directly image residual charge or separately measure electron and hole injection during each half-cycle."
    support_class: "author hypothesis with indirect support from measured AC/DC polarity response, composition-dependent EL(-):EL(+) ratios, and phase-lag trends"
    verification_status: "VERIFIED"
