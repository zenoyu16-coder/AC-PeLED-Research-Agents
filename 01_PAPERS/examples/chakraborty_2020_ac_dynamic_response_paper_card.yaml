    - "Oscilloscope bandwidth and sampling rate used for the reported traces: Not explicitly specified in text"
    - "Channel-delay calibration between applied voltage and EL detection: Not explicitly specified in text"
    - "Whether EL(-):EL(+) was calculated from single traces, averages, or multiple devices: Not explicitly specified in text"
    - "Operational lifetime, retention, and thermal monitoring: Not explicitly specified in text"

