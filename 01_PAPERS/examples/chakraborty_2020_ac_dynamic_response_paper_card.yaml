mechanism:
  main_claim: "The authors attribute negative-half-cycle EL to residual carriers injected during the preceding positive half-cycle and interpret composition-dependent half-cycle response and phase lag through carrier ambipolarity and transit time."
  material_structure_link: "XRD and optical absorption confirm composition-dependent MAPbBrxI3-x phases and bandgaps; these measurements do not directly establish the dynamic EL mechanism."
  carrier_transport_link: "STS-derived type-II band alignment supports forward-bias injection in the ITO-positive direction; residual-carrier reversal and ambipolar transport during AC half-cycles remain author interpretation supported indirectly by PN trends."
  ion_migration_or_polarization: "The paper mentions ionic conduction and prior ion-migration or polarization work as context, but does not directly measure ion migration or interfacial polarization in this dynamic-response study."
  recombination_mechanism: "Band-to-band radiative recombination is proposed; negative-half-cycle emission is explained by recombination of residual carriers as their motion reverses."
  degradation_mechanism: "Not explicitly specified in text"

evidence:
  direct_evidence:
    - "Figure 3a,b: synchronized traces directly show EL in both positive- and negative-voltage half-cycles at 75 Hz and 14.0 V peak-to-peak."
    - "Figure 3c: measured peak ratio EL(-):EL(+) varies across MAPbBrxI3-x compositions and reaches as high as 0.8 for MAPbI3."
    - "Figure 4: under DC bias, EL is observed only for positive voltage in the tested MAPbI3 and MAPbBr3 devices."
    - "Figure 5a-c: at 5.6 kHz, positive- and negative-half-cycle EL lag the applied-voltage crests; the measured lag is frequency and material dependent."
    - "Figure 6 and Table I: half-cycle EL intensity decreases at high frequency, with reported -3-dB frequencies from 5.8 to 22.7 kHz."
  indirect_evidence:
    - "The decrease in EL(-):EL(+) with bromine incorporation is consistent with the authors' ambipolarity interpretation but does not directly measure electron and hole mobilities during each half-cycle."
    - "The contrast between AC negative-half-cycle EL and the absence of reverse-bias DC EL supports a history-dependent AC process but does not alone prove residual-charge recombination."
    - "The material-dependent phase lag is consistent with carrier-transit limitations, while the derived effective mobilities depend on the authors' transport model."
  author_hypothesis:
    - "Residual carriers injected during the positive half-cycle reverse direction and recombine radiatively during the following negative half-cycle."
    - "The EL(-):EL(+) ratio reflects the degree of carrier ambipolarity in the perovskite."
    - "High-frequency phase lag arises when the half-cycle duration becomes shorter than the carrier transit time."
    - "High-frequency half-cycle asymmetry may arise from current hysteresis and voltage-sweep-direction-dependent injection barriers."
  missing_details:
